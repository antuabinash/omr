<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Scanner - Auto Capture</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        button { padding: 15px 30px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        
        #scannerSection { display: none; margin-top: 20px; }
        .video-container { position: relative; width: 100%; max-width: 450px; margin: 0 auto; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        
        /* EvalBee Target Squares */
        .target-square { position: absolute; width: 60px; height: 60px; border: 3px solid #4285f4; background-color: rgba(66, 133, 244, 0.15); z-index: 10; pointer-events: none; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .tl { top: 15%; left: 8%; } .tr { top: 15%; right: 8%; }
        .bl { bottom: 15%; left: 8%; } .br { bottom: 15%; right: 8%; }

        .status-text { background: #007bff; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; transition: background 0.3s;}

        canvas { display: none; width: 100%; border: 3px solid #28a745; border-radius: 8px; margin-top: 15px; }
        #scoreDisplay { display: none; background: #28a745; color: white; font-size: 24px; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <div id="disclaimerSection" class="card">
        <h2>System Requirements</h2>
        <button id="agreeBtn" disabled>Loading AI Engine...</button>
    </div>

    <div id="scannerSection" class="card">
        <div id="scanStatus" class="status-text">Place the 4 black squares inside the blue boxes...</div>
        
        <div class="video-container" id="vidContainer">
            <video id="cameraFeed" autoplay playsinline></video>
            <div class="target-square tl"></div><div class="target-square tr"></div>
            <div class="target-square bl"></div><div class="target-square br"></div>
        </div>
        
        <canvas id="canvasOutput"></canvas>
        <div id="scoreDisplay">Score: -- / 25</div>
    </div>

    <script>
        const agreeBtn = document.getElementById('agreeBtn');
        const disclaimerSection = document.getElementById('disclaimerSection');
        const scannerSection = document.getElementById('scannerSection');
        const videoElement = document.getElementById('cameraFeed');
        const canvasElement = document.getElementById('canvasOutput');
        const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });
        const scanStatus = document.getElementById('scanStatus');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const vidContainer = document.getElementById('vidContainer');
        
        let autoScanInterval;
        let stableFrames = 0;
        let lastCenters = [];

        function onOpenCvReady() {
            agreeBtn.disabled = false;
            agreeBtn.innerText = "Start Auto-Scanner";
        }

        agreeBtn.addEventListener('click', () => {
            disclaimerSection.style.display = 'none';
            scannerSection.style.display = 'block';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
            .then(stream => {
                videoElement.srcObject = stream;
                autoScanInterval = setInterval(attemptAutoCapture, 500); // Check every half second
            })
            .catch(error => { alert("Camera access required."); });
        });

        // Helper to check if phone is being held steady
        function areCentersStable(newCenters, oldCenters) {
            if (oldCenters.length !== 4) return false;
            let diff = 0;
            for(let i=0; i<4; i++) {
                diff += Math.abs(newCenters[i].x - oldCenters[i].x) + Math.abs(newCenters[i].y - oldCenters[i].y);
            }
            return diff < 40; // Max 10 pixels of hand shake allowed
        }

        function attemptAutoCapture() {
            if (videoElement.videoWidth === 0) return; 

            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            try {
                let src = cv.imread('canvasOutput'); 
                let gray = new cv.Mat();
                let thresh = new cv.Mat();
                
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                cv.threshold(gray, thresh, 120, 255, cv.THRESH_BINARY_INV);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let centers = []; 

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    let bRect = cv.boundingRect(cnt);
                    let markerAspectRatio = bRect.width / bRect.height;

                    if (area > 300 && area < 10000 && markerAspectRatio >= 0.7 && markerAspectRatio <= 1.3) { 
                        let perimeter = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);

                        if (approx.rows === 4) centers.push({ x: bRect.x + (bRect.width / 2), y: bRect.y + (bRect.height / 2) });
                        approx.delete();
                    }
                }

                // 1. THE "DON'T HURRY" LOCK
                if (centers.length === 4) {
                    centers.sort((a, b) => (a.x + a.y) - (b.x + b.y));
                    let tl = centers[0]; let br = centers[3];
                    centers.sort((a, b) => (a.x - a.y) - (b.x - b.y));
                    let bl = centers[0]; let tr = centers[3];
                    let sortedCenters = [tl, tr, bl, br];

                    if (areCentersStable(sortedCenters, lastCenters)) {
                        stableFrames++;
                        scanStatus.style.backgroundColor = "#ffc107";
                        scanStatus.innerText = `Holding steady... ${stableFrames}/4`;
                    } else {
                        stableFrames = 1;
                        scanStatus.style.backgroundColor = "#17a2b8";
                        scanStatus.innerText = "Aligning...";
                    }
                    lastCenters = sortedCenters;

                    // Execute Capture if stable for 4 frames!
                    if (stableFrames >= 4) {
                        clearInterval(autoScanInterval); 
                        scanStatus.style.backgroundColor = "#28a745";
                        scanStatus.innerText = "Processing EvalBee Grid...";

                        let maxWidth = Math.max(Math.hypot(br.x - bl.x, br.y - bl.y), Math.hypot(tr.x - tl.x, tr.y - tl.y));
                        let maxHeight = Math.max(Math.hypot(tr.x - br.x, tr.y - br.y), Math.hypot(tl.x - bl.x, tl.y - bl.y));

                        let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                        let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight]);
                        
                        let M = cv.getPerspectiveTransform(srcTri, dstTri);
                        let warped = new cv.Mat();
                        cv.warpPerspective(src, warped, M, new cv.Size(maxWidth, maxHeight), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

                        let warpedGray = new cv.Mat();
                        cv.cvtColor(warped, warpedGray, cv.COLOR_RGBA2GRAY);
                        let warpedThresh = new cv.Mat();
                        cv.threshold(warpedGray, warpedThresh, 150, 255, cv.THRESH_BINARY_INV);
                        
                        // --- 2. FIND ROW SYNC MARKS (EVALBEE LOGIC) ---
                        let rowContours = new cv.MatVector();
                        cv.findContours(warpedThresh, rowContours, new cv.Mat(), cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

                        let rowMarks = [];
                        for (let j = 0; j < rowContours.size(); ++j) {
                            let bRect = cv.boundingRect(rowContours.get(j));
                            let cX = bRect.x + (bRect.width / 2);
                            let cY = bRect.y + (bRect.height / 2);

                            // Sync marks are on far left (<8%), and are wide rectangles (width > height * 1.5)
                            if (cX < maxWidth * 0.08 && bRect.width > bRect.height * 1.5 && bRect.width > maxWidth * 0.01) {
                                // Exclude corner anchors from this array
                                if (cY > maxHeight * 0.05 && cY < maxHeight * 0.95) {
                                    rowMarks.push({ y: cY });
                                }
                            }
                        }

                        rowMarks.sort((a, b) => a.y - b.y);

                        // Remove duplicates (sometimes OpenCV counts the same mark twice)
                        let uniqueMarks = [];
                        for(let i=0; i<rowMarks.length; i++) {
                            if (uniqueMarks.length === 0 || rowMarks[i].y - uniqueMarks[uniqueMarks.length-1].y > maxHeight * 0.02) {
                                uniqueMarks.push(rowMarks[i]);
                            }
                        }

                        // --- 3. PROJECT THE VIRTUAL GRID ---
                        if (uniqueMarks.length === 13) {
                            let filledBubbles = 0;
                            // These match the exact CSS percentages from our omr_sheet_evalbee.html!
                            let col1X = [0.20, 0.28, 0.36, 0.44];
                            let col2X = [0.66, 0.74, 0.82, 0.90];
                            let radius = maxWidth * 0.015;

                            // Reusable function to grade a specific bubble
                            let checkBubble = function(x, y, r) {
                                let box = new cv.Rect(x - r, y - r, r * 2, r * 2);
                                if(box.x < 0 || box.y < 0 || box.x + box.width > maxWidth || box.y + box.height > maxHeight) return;
                                
                                let roi = warpedThresh.roi(box);
                                let fillRatio = cv.countNonZero(roi) / (box.width * box.height);
                                let center = new cv.Point(x, y);

                                if (fillRatio > 0.40) {
                                    filledBubbles++;
                                    cv.circle(warped, center, Math.round(r), [0, 255, 0, 255], 4); 
                                } else {
                                    cv.circle(warped, center, Math.round(r), [255, 0, 0, 255], 2);
                                }
                                roi.delete();
                            };

                            for(let i=0; i<13; i++) {
                                let rowY = uniqueMarks[i].y;
                                // Grade Col 1
                                col1X.forEach((xPct) => { checkBubble(maxWidth * xPct, rowY, radius); });
                                // Grade Col 2 (Only 12 questions)
                                if (i < 12) {
                                    col2X.forEach((xPct) => { checkBubble(maxWidth * xPct, rowY, radius); });
                                }
                            }
                            
                            // Display final UI
                            canvasElement.width = maxWidth;
                            canvasElement.height = maxHeight;
                            canvasElement.style.display = "block"; 
                            cv.imshow('canvasOutput', warped);
                            
                            vidContainer.style.display = "none";
                            scanStatus.innerText = "Scan Complete!";
                            scoreDisplay.style.display = "block";
                            scoreDisplay.innerText = `Mark: ${filledBubbles} / 25`; 

                        } else {
                            // FAILED TO FIND ALL 13 MARKS - Restart Scanner
                            scanStatus.style.backgroundColor = "#dc3545";
                            scanStatus.innerText = `Error: Found ${uniqueMarks.length}/13 row marks. Retrying...`;
                            setTimeout(() => {
                                stableFrames = 0;
                                lastCenters = [];
                                autoScanInterval = setInterval(attemptAutoCapture, 500);
                            }, 2000);
                        }

                        // Memory cleanup
                        srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
                        warpedGray.delete(); warpedThresh.delete(); rowContours.delete();
                    }
                } else {
                    stableFrames = 0;
                    lastCenters = [];
                    scanStatus.style.backgroundColor = "#007bff";
                    scanStatus.innerText = "Place the 4 black squares inside the blue boxes...";
                }

                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
            } catch (err) {}
        }
    </script>
</body>
</html>
