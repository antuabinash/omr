<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Scanner - Auto Capture</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        
        button { padding: 15px 30px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        
        #scannerSection { display: none; margin-top: 20px; }
        
        /* Camera & Overlay Container */
        .video-container { position: relative; width: 100%; max-width: 450px; margin: 0 auto; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        
        /* The Visual Guide Overlay */
        .guide-overlay { position: absolute; top: 15%; left: 10%; right: 10%; bottom: 15%; border: 2px dashed rgba(255, 255, 255, 0.6); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); z-index: 10; pointer-events: none; }
        .corner { position: absolute; width: 30px; height: 30px; border: 5px solid #28a745; }
        .tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }
        .tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }
        .bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }
        .br { bottom: -3px; right: -3px; border-left: none; border-top: none; }

        .status-text { background: #007bff; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }

        canvas { display: none; width: 100%; border: 3px solid #28a745; border-radius: 8px; margin-top: 15px; }
        #scoreDisplay { display: none; background: #28a745; color: white; font-size: 24px; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <div id="disclaimerSection" class="card">
        <h2>System Requirements</h2>
        <button id="agreeBtn" disabled>Loading AI Engine...</button>
    </div>

    <div id="scannerSection" class="card">
        <div id="scanStatus" class="status-text">Align the 4 black squares inside the green corners...</div>
        
        <div class="video-container" id="vidContainer">
            <video id="cameraFeed" autoplay playsinline></video>
            <!-- Auto-Capture Visual Guide -->
            <div class="guide-overlay">
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>
            </div>
        </div>
        
        <canvas id="canvasOutput"></canvas>
        <div id="scoreDisplay">Score: -- / 25</div>
    </div>

    <script>
        const agreeBtn = document.getElementById('agreeBtn');
        const disclaimerSection = document.getElementById('disclaimerSection');
        const scannerSection = document.getElementById('scannerSection');
        const videoElement = document.getElementById('cameraFeed');
        const canvasElement = document.getElementById('canvasOutput');
        const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });
        const scanStatus = document.getElementById('scanStatus');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const vidContainer = document.getElementById('vidContainer');
        
        let autoScanInterval;

        function onOpenCvReady() {
            agreeBtn.disabled = false;
            agreeBtn.innerText = "Start Auto-Scanner";
        }

        agreeBtn.addEventListener('click', () => {
            disclaimerSection.style.display = 'none';
            scannerSection.style.display = 'block';

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            })
            .then(stream => {
                videoElement.srcObject = stream;
                // Start the auto-capture loop (checks every 800ms)
                autoScanInterval = setInterval(attemptAutoCapture, 800);
            })
            .catch(error => { alert("Camera access required."); });
        });

        function attemptAutoCapture() {
            // Ignore if video isn't fully loaded
            if (videoElement.videoWidth === 0) return; 

            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            try {
                let src = cv.imread('canvasOutput'); 
                let gray = new cv.Mat();
                let thresh = new cv.Mat();
                
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                cv.threshold(gray, thresh, 120, 255, cv.THRESH_BINARY_INV);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let centers = []; 

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    let markerAspectRatio = cv.boundingRect(cnt).width / cv.boundingRect(cnt).height;

                    if (area > 300 && area < 10000 && markerAspectRatio >= 0.7 && markerAspectRatio <= 1.3) { 
                        let perimeter = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);

                        if (approx.rows === 4) {
                            let rect = cv.boundingRect(cnt);
                            centers.push({ x: rect.x + (rect.width / 2), y: rect.y + (rect.height / 2) });
                        }
                        approx.delete();
                    }
                }

                // SUCCESS: If exactly 4 squares are found, auto-capture triggers!
                if (centers.length === 4) {
                    clearInterval(autoScanInterval); // Stop scanning!
                    scanStatus.style.backgroundColor = "#28a745";
                    scanStatus.innerText = "Processing Image...";
                    
                    centers.sort((a, b) => (a.x + a.y) - (b.x + b.y));
                    let tl = centers[0]; let br = centers[3];
                    centers.sort((a, b) => (a.x - a.y) - (b.x - b.y));
                    let bl = centers[0]; let tr = centers[3];

                    let maxWidth = Math.max(Math.hypot(br.x - bl.x, br.y - bl.y), Math.hypot(tr.x - tl.x, tr.y - tl.y));
                    let maxHeight = Math.max(Math.hypot(tr.x - br.x, tr.y - br.y), Math.hypot(tl.x - bl.x, tl.y - bl.y));

                    let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                    let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight]);
                    
                    let M = cv.getPerspectiveTransform(srcTri, dstTri);
                    let warped = new cv.Mat();
                    cv.warpPerspective(src, warped, M, new cv.Size(maxWidth, maxHeight), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

                    // --- DETECT BUBBLES ---
                    let warpedGray = new cv.Mat();
                    cv.cvtColor(warped, warpedGray, cv.COLOR_RGBA2GRAY);
                    let warpedThresh = new cv.Mat();
                    cv.threshold(warpedGray, warpedThresh, 150, 255, cv.THRESH_BINARY_INV);
                    
                    let bubbleContours = new cv.MatVector();
                    cv.findContours(warpedThresh, bubbleContours, new cv.Mat(), cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

                    let filledBubbles = 0;
                    let imageArea = maxWidth * maxHeight;

                    for (let j = 0; j < bubbleContours.size(); ++j) {
                        let bCnt = bubbleContours.get(j);
                        let bRect = cv.boundingRect(bCnt);
                        let aspectRatio = bRect.width / bRect.height;
                        let area = cv.contourArea(bCnt);
                        
                        let hull = new cv.Mat();
                        cv.convexHull(bCnt, hull, false, true);
                        let solidity = area / cv.contourArea(hull);
                        hull.delete(); 

                        if (aspectRatio >= 0.75 && aspectRatio <= 1.25 && area > imageArea * 0.0005 && area < imageArea * 0.005 && solidity > 0.8) {
                            
                            let roi = warpedThresh.roi(bRect);
                            let fillRatio = cv.countNonZero(roi) / (bRect.width * bRect.height);
                            let center = new cv.Point(bRect.x + bRect.width / 2, bRect.y + bRect.height / 2);

                            // Calculate marks: Count filled bubbles
                            if (fillRatio > 0.45) {
                                filledBubbles++;
                                cv.circle(warped, center, bRect.width / 2, [0, 255, 0, 255], 4); 
                            } else {
                                cv.circle(warped, center, bRect.width / 2, [255, 0, 0, 255], 2);
                            }
                            roi.delete();
                        }
                    }
                    
                    // Display final UI
                    canvasElement.width = maxWidth;
                    canvasElement.height = maxHeight;
                    canvasElement.style.display = "block"; 
                    cv.imshow('canvasOutput', warped);
                    
                    vidContainer.style.display = "none"; // Hide camera
                    scanStatus.innerText = "Scan Complete!";
                    scoreDisplay.style.display = "block";
                    // Displaying total filled. In the future, we will map this to an answer key!
                    scoreDisplay.innerText = `Mark: ${filledBubbles} / 25`; 

                    srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
                    warpedGray.delete(); warpedThresh.delete(); bubbleContours.delete();
                }

                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();

            } catch (err) {
                // Ignore errors during auto-scan loops (it usually means it just hasn't seen the page yet)
            }
        }
    </script>
</body>
</html>
