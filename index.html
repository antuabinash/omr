<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Scanner - Portal</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        .warning-box { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 15px; border-radius: 5px; text-align: left; font-size: 14px; margin-bottom: 20px;}
        
        /* Button Styles */
        button { padding: 15px 30px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s;}
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        
        #scannerSection { display: none; margin-top: 20px; }
        video { width: 100%; border: 3px solid #333; border-radius: 8px; background: #000; }
        
        /* Canvas is hidden until we take a picture */
        canvas { display: none; width: 100%; max-width: 400px; border: 3px solid #28a745; border-radius: 8px; margin-top: 15px; }
    </style>
    
    <!-- LOAD OPENCV.JS -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <!-- GATEKEEPER SCREEN -->
    <div id="disclaimerSection" class="card">
        <h2>System Requirements</h2>
        
        <div class="warning-box">
            <strong>⚠️ For Smooth Scanning:</strong>
            <ul>
                <li>Use <b>Google Chrome</b> (Android) or <b>Safari</b> (iOS).</li>
                <li>Device must have at least <b>4GB RAM</b>.</li>
                <li>Ensure good lighting without shadows on the paper.</li>
            </ul>
        </div>

        <p id="browserWarning" style="color: red; font-weight: bold; display: none;">
            Please open this link in Google Chrome!
        </p>

        <!-- Button starts DISABLED -->
        <button id="agreeBtn" disabled>Loading AI Engine...</button>
    </div>

    <!-- SCANNER SCREEN (Hidden initially) -->
    <div id="scannerSection" class="card">
        <h2>Align Sheet & Scan</h2>
        
        <!-- Live Camera Feed -->
        <video id="cameraFeed" autoplay playsinline></video>
        
        <button id="snapBtn" style="background-color: #007bff; margin-top: 15px;">Grade Sheet</button>
        
        <!-- The Processed Image will appear here -->
        <canvas id="canvasOutput"></canvas>
    </div>

    <script>
        // --- HTML ELEMENTS ---
        const agreeBtn = document.getElementById('agreeBtn');
        const snapBtn = document.getElementById('snapBtn');
        const disclaimerSection = document.getElementById('disclaimerSection');
        const scannerSection = document.getElementById('scannerSection');
        const videoElement = document.getElementById('cameraFeed');
        const browserWarning = document.getElementById('browserWarning');
        const canvasElement = document.getElementById('canvasOutput');
        const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });

        // --- OPENCV INITIALIZATION ---
        function onOpenCvReady() {
            console.log("OpenCV is ready!");
            agreeBtn.disabled = false;
            agreeBtn.innerText = "I Understand, Open Camera";
            agreeBtn.style.backgroundColor = "#28a745"; 
        }

        // --- BROWSER CHECK ---
        const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (!isChrome && !isIOS) {
            browserWarning.style.display = "block";
        }

        // --- CAMERA LOGIC ---
        agreeBtn.addEventListener('click', () => {
            disclaimerSection.style.display = 'none';
            scannerSection.style.display = 'block';

            navigator.mediaDevices.getUserMedia({ 
                // Force back camera and limit resolution to prevent browser crashes
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            })
            .then(stream => {
                videoElement.srcObject = stream;
            })
            .catch(error => {
                console.error("Camera error:", error);
                alert("Camera access is required to scan the OMR sheet.");
            });
        });

        // --- CAPTURE AND PROCESS IMAGE ---
        snapBtn.addEventListener('click', () => {
            // 1. Match canvas size to video size
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            
            // 2. Draw current video frame onto canvas
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            // 3. Process with OpenCV
            try {
                let src = cv.imread('canvasOutput'); 
                let gray = new cv.Mat();
                let thresh = new cv.Mat();
                
                // Convert to grayscale and blur
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                let ksize = new cv.Size(5, 5);
                cv.GaussianBlur(gray, gray, ksize, 0, 0, cv.BORDER_DEFAULT);

                // Thresholding: Force pure black and white.
                cv.threshold(gray, thresh, 120, 255, cv.THRESH_BINARY_INV);

                // Find Contours
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let squaresFound = 0;
                let centers = []; // Array to store the center point of every square we find

                // Loop through the outlines to find our anchor squares
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    if (area > 300 && area < 10000) { 
                        let perimeter = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);

                        if (approx.rows === 4) {
                            squaresFound++;
                            let rect = cv.boundingRect(cnt);
                            
                            // Calculate the exact center of this square
                            let cx = rect.x + (rect.width / 2);
                            let cy = rect.y + (rect.height / 2);
                            centers.push({ x: cx, y: cy });
                        }
                        approx.delete();
                    }
                }

                // If we found at least 4 squares, we can flatten the image!
                if (centers.length >= 4) {
                    // Sort the points to find the 4 outermost corners using math
                    // Top-Left has the smallest (x + y)
                    // Bottom-Right has the largest (x + y)
                    // Top-Right has the largest (x - y)
                    // Bottom-Left has the smallest (x - y)
                    
                    centers.sort((a, b) => (a.x + a.y) - (b.x + b.y));
                    let tl = centers[0]; 
                    let br = centers[centers.length - 1];

                    centers.sort((a, b) => (a.x - a.y) - (b.x - b.y));
                    let bl = centers[0];
                    let tr = centers[centers.length - 1];

                    // Calculate the size of our new flattened image
                    let widthA = Math.hypot(br.x - bl.x, br.y - bl.y);
                    let widthB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
                    let maxWidth = Math.max(widthA, widthB);

                    let heightA = Math.hypot(tr.x - br.x, tr.y - br.y);
                    let heightB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
                    let maxHeight = Math.max(heightA, heightB);

                    // Create the math matrices for the transformation
                    let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                    let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight]);
                    let dsize = new cv.Size(maxWidth, maxHeight);

                    // WARP PERSPECTIVE (Stretch and Flatten)
                    let M = cv.getPerspectiveTransform(srcTri, dstTri);
                    let warped = new cv.Mat();
                    cv.warpPerspective(src, warped, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

                    // Resize the canvas to match our new flattened image
                    canvasElement.width = maxWidth;
                    canvasElement.height = maxHeight;
                    
                    // Show the perfect, flattened image!
                    canvasElement.style.display = "block"; 
                    cv.imshow('canvasOutput', warped);

                    // Clean up memory for the warp variables
                    srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
                    console.log("Successfully deskewed and flattened the sheet!");

                } else {
                    alert(`Only found ${squaresFound} markers. Please make sure all 4 corners of the OMR sheet are clearly in the frame!`);
                }

                // CLEAN UP ALL MEMORY
                src.delete(); gray.delete(); thresh.delete(); 
                contours.delete(); hierarchy.delete();

            } catch (err) {
                console.error("OpenCV Error:", err);
                alert("Failed to process image. Make sure the AI Engine has loaded.");
            }
        });
    </script>
</body>
</html>
