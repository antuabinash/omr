<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Scanner - Square Math</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        
        button { padding: 15px 30px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s;}
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        
        #scannerSection { display: none; margin-top: 20px; }
        .video-container { position: relative; width: 100%; max-width: 450px; margin: 0 auto; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        
        /* 1:1 Square Guide Container */
        .guide-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; aspect-ratio: 1 / 1; z-index: 10; pointer-events: none; }
        
        /* 4 Target Squares */
        .target-square { position: absolute; width: 50px; height: 50px; border: 3px solid #4285f4; background-color: rgba(66, 133, 244, 0.15); box-shadow: 0 0 10px rgba(0,0,0,0.5); border-radius: 4px; }
        .ts-tl { top: 0; left: 0; }
        .ts-tr { top: 0; right: 0; }
        .ts-bl { bottom: 0; left: 0; }
        .ts-br { bottom: 0; right: 0; }

        .status-text { background: #007bff; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; transition: background 0.3s;}

        canvas { display: none; width: 100%; border: 3px solid #28a745; border-radius: 8px; margin-top: 15px; }
        #scoreDisplay { display: none; background: #28a745; color: white; font-size: 24px; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        #resetBtn { display: none; background-color: #007bff; margin-top: 15px; }
    </style>
    
    <script>
        window.onOpenCvReady = function() {
            document.getElementById('agreeBtn').disabled = false;
            document.getElementById('agreeBtn').innerText = "Start Camera Scanner";
        };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="window.onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <div id="disclaimerSection" class="card">
        <h2>System Requirements</h2>
        <button id="agreeBtn" disabled>Loading AI Engine...</button>
    </div>

    <div id="scannerSection" class="card">
        <div id="scanStatus" class="status-text">Place the 4 black squares inside the blue boxes...</div>
        
        <div class="video-container" id="vidContainer">
            <video id="cameraFeed" autoplay playsinline></video>
            
            <div class="guide-frame">
                <div class="target-square ts-tl"></div>
                <div class="target-square ts-tr"></div>
                <div class="target-square ts-bl"></div>
                <div class="target-square ts-br"></div>
            </div>
        </div>
        
        <canvas id="canvasOutput"></canvas>
        <div id="scoreDisplay">Score: -- / 25</div>
        <button id="resetBtn">Scan Next Sheet</button>
    </div>

    <script>
        const agreeBtn = document.getElementById('agreeBtn');
        const disclaimerSection = document.getElementById('disclaimerSection');
        const scannerSection = document.getElementById('scannerSection');
        const videoElement = document.getElementById('cameraFeed');
        const canvasElement = document.getElementById('canvasOutput');
        const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });
        
        const scanStatus = document.getElementById('scanStatus');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const vidContainer = document.getElementById('vidContainer');
        
        let autoScanInterval;
        let stableFrames = 0;
        let lastCenters = [];

        agreeBtn.addEventListener('click', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("CAMERA BLOCKED: Please ensure you are using a secure connection (HTTPS) or localhost.");
                return;
            }

            disclaimerSection.style.display = 'none';
            scannerSection.style.display = 'block';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
            .then(stream => {
                videoElement.srcObject = stream;
                autoScanInterval = setInterval(attemptAutoCapture, 500); 
            })
            .catch(error => { 
                alert(`Camera Failed to Start: ${error.message}`); 
            });
        });

        function areCentersStable(newCenters, oldCenters) {
            if (oldCenters.length !== 4) return false;
            let diff = 0;
            for(let i=0; i<4; i++) {
                diff += Math.abs(newCenters[i].x - oldCenters[i].x) + Math.abs(newCenters[i].y - oldCenters[i].y);
            }
            return diff < 40; 
        }

        function attemptAutoCapture() {
            if (videoElement.videoWidth === 0) return; 

            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            try {
                let src = cv.imread('canvasOutput'); 
                let gray = new cv.Mat();
                let thresh = new cv.Mat();
                
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                cv.threshold(gray, thresh, 120, 255, cv.THRESH_BINARY_INV);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let cornerRects = []; 

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    let bRect = cv.boundingRect(cnt);
                    let markerAspectRatio = bRect.width / bRect.height;

                    if (area > 300 && area < 15000 && markerAspectRatio >= 0.7 && markerAspectRatio <= 1.3) { 
                        let perimeter = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);

                        if (approx.rows === 4) {
                            cornerRects.push(bRect);
                        }
                        approx.delete();
                    }
                }

                if (cornerRects.length >= 4) {
                    cornerRects.sort((a, b) => (a.x + a.y) - (b.x + b.y));
                    let tlRect = cornerRects[0]; 
                    let brRect = cornerRects[cornerRects.length - 1];
                    
                    cornerRects.sort((a, b) => (a.x - a.y) - (b.x - b.y));
                    let blRect = cornerRects[0]; 
                    let trRect = cornerRects[cornerRects.length - 1];

                    let tl = { x: tlRect.x, y: tlRect.y };
                    let tr = { x: trRect.x + trRect.width, y: trRect.y };
                    let bl = { x: blRect.x, y: blRect.y + blRect.height };
                    let br = { x: brRect.x + brRect.width, y: brRect.y + brRect.height };
                    
                    let sortedCorners = [tl, tr, bl, br];
                    let estimatedWidth = Math.hypot(tr.x - tl.x, tr.y - tl.y);
                    
                    if (estimatedWidth > canvasElement.width * 0.4) {
                        
                        if (areCentersStable(sortedCorners, lastCenters)) {
                            stableFrames++;
                            scanStatus.style.backgroundColor = "#ffc107";
                            scanStatus.innerText = `Holding steady... ${stableFrames}/4`;
                        } else {
                            stableFrames = 1;
                            scanStatus.style.backgroundColor = "#17a2b8";
                            scanStatus.innerText = "Aligning...";
                        }
                        lastCenters = sortedCorners;

                        if (stableFrames >= 4) {
                            clearInterval(autoScanInterval); 
                            scanStatus.style.backgroundColor = "#28a745";
                            scanStatus.innerText = "Processing Perfect Square...";

                            // 1:1 SQUARE MATH FIX
                            let maxWidth = Math.max(Math.hypot(br.x - bl.x, br.y - bl.y), Math.hypot(tr.x - tl.x, tr.y - tl.y));
                            let maxHeight = Math.max(Math.hypot(tr.x - br.x, tr.y - br.y), Math.hypot(tl.x - bl.x, tl.y - bl.y));
                            let size = Math.max(maxWidth, maxHeight); // Force a perfect square!

                            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                            
                            // Warp it to size x size
                            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, size, 0, size, size, 0, size]);
                            let M = cv.getPerspectiveTransform(srcTri, dstTri);
                            let warped = new cv.Mat();
                            cv.warpPerspective(src, warped, M, new cv.Size(size, size), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

                            let warpedGray = new cv.Mat();
                            cv.cvtColor(warped, warpedGray, cv.COLOR_RGBA2GRAY);
                            let warpedThresh = new cv.Mat();
                            cv.threshold(warpedGray, warpedThresh, 150, 255, cv.THRESH_BINARY_INV);
                            
                            // FIND 13 LEFT ROW MARKS
                            let rowContours = new cv.MatVector();
                            cv.findContours(warpedThresh, rowContours, new cv.Mat(), cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

                            let rowMarks = [];
                            for (let j = 0; j < rowContours.size(); ++j) {
                                let bRect = cv.boundingRect(rowContours.get(j));
                                let cX = bRect.x + (bRect.width / 2);
                                let cY = bRect.y + (bRect.height / 2);

                                if (cX < size * 0.12 && bRect.width > bRect.height * 1.5 && bRect.width > size * 0.01) {
                                    if (cY > size * 0.05 && cY < size * 0.95) {
                                        rowMarks.push({ y: cY });
                                    }
                                }
                            }

                            rowMarks.sort((a, b) => a.y - b.y);

                            let uniqueMarks = [];
                            for(let i=0; i<rowMarks.length; i++) {
                                if (uniqueMarks.length === 0 || rowMarks[i].y - uniqueMarks[uniqueMarks.length-1].y > size * 0.02) {
                                    uniqueMarks.push(rowMarks[i]);
                                }
                            }

                            // GRADE THE SHEET IF 13 MARKS ARE FOUND
                            if (uniqueMarks.length === 13) {
                                
                                const ANSWER_KEY = [
                                    0, 1, 2, 3, 0, // Q1-5
                                    1, 2, 3, 0, 1, // Q6-10
                                    2, 3, 0, 1, 2, // Q11-15
                                    3, 0, 1, 2, 3, // Q16-20
                                    0, 1, 2, 3, 0  // Q21-25
                                ];

                                let correctAnswers = 0;
                                
                                let col1X = [0.20, 0.28, 0.36, 0.44];
                                let col2X = [0.66, 0.74, 0.82, 0.90];
                                let radius = size * 0.018;

                                let isBubbleFilled = function(x, y, r) {
                                    let box = new cv.Rect(x - r, y - r, r * 2, r * 2);
                                    if(box.x < 0 || box.y < 0 || box.x + box.width > size || box.y + box.height > size) return false;
                                    let roi = warpedThresh.roi(box);
                                    let fillRatio = cv.countNonZero(roi) / (box.width * box.height);
                                    roi.delete();
                                    return fillRatio > 0.40; 
                                };

                                for (let q = 0; q < 25; q++) {
                                    let isCol1 = (q < 13);
                                    let rowIdx = isCol1 ? q : (q - 13);
                                    let rowY = uniqueMarks[rowIdx].y;
                                    let xPcts = isCol1 ? col1X : col2X;
                                    
                                    let expectedAns = ANSWER_KEY[q];
                                    let filledOptions = [];
                                    
                                    for (let opt = 0; opt < 4; opt++) {
                                        let x = size * xPcts[opt];
                                        if (isBubbleFilled(x, rowY, radius)) {
                                            filledOptions.push(opt);
                                        }
                                    }
                                    
                                    let isCorrect = (filledOptions.length === 1 && filledOptions[0] === expectedAns);
                                    if (isCorrect) correctAnswers++;

                                    for (let opt = 0; opt < 4; opt++) {
                                        let x = size * xPcts[opt];
                                        let center = new cv.Point(x, rowY);
                                        let filled = filledOptions.includes(opt);
                                        
                                        if (filled) {
                                            cv.circle(warped, center, Math.round(radius), isCorrect ? [0, 255, 0, 255] : [255, 0, 0, 255], 4);
                                        } else {
                                            cv.circle(warped, center, Math.round(radius), (opt === expectedAns) ? [0, 150, 255, 255] : [200, 200, 200, 255], (opt === expectedAns) ? 3 : 2);
                                        }
                                    }
                                }
                                
                                canvasElement.width = size;
                                canvasElement.height = size;
                                canvasElement.style.display = "block"; 
                                cv.imshow('canvasOutput', warped);
                                
                                vidContainer.style.display = "none";
                                scanStatus.style.backgroundColor = "#28a745";
                                scanStatus.innerText = "Scan Complete!";
                                scoreDisplay.style.display = "block";
                                scoreDisplay.innerText = `Score: ${correctAnswers} / 25`; 
                                resetBtn.style.display = "block"; 

                            } else {
                                stableFrames = 0;
                                lastCenters = [];
                                scanStatus.style.backgroundColor = "#17a2b8";
                                scanStatus.innerText = `Re-aligning... Found ${uniqueMarks.length}/13 row marks.`;
                                autoScanInterval = setInterval(attemptAutoCapture, 500);
                            }

                            srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
                            warpedGray.delete(); warpedThresh.delete(); rowContours.delete();
                        }
                    } else {
                        stableFrames = 0;
                        lastCenters = [];
                        scanStatus.style.backgroundColor = "#007bff";
                        scanStatus.innerText = "Bring the sheet closer...";
                    }
                } else {
                    stableFrames = 0;
                    lastCenters = [];
                    scanStatus.style.backgroundColor = "#007bff";
                    scanStatus.innerText = "Place the 4 black squares inside the blue boxes...";
                }

                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
            } catch (err) {}
        }

        resetBtn.addEventListener('click', () => {
            canvasElement.style.display = "none";
            scoreDisplay.style.display = "none";
            resetBtn.style.display = "none";
            vidContainer.style.display = "block";
            
            stableFrames = 0;
            lastCenters = [];
            scanStatus.style.backgroundColor = "#007bff";
            scanStatus.innerText = "Place the 4 black squares inside the blue boxes...";
            
            autoScanInterval = setInterval(attemptAutoCapture, 500);
        });
    </script>
</body>
</html>
